<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="x-ogp-key" content="YOUR_API_KEY">
  <title>Fling Punch - Jetpack Jungle!</title>
  <script src="https://sdk.play.fun"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      overflow: hidden;
      touch-action: none;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
      background: #87CEEB;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    #game-canvas { display: block; }
    
    #ui {
      position: fixed;
      top: 15px; left: 15px;
      pointer-events: none;
      z-index: 10;
    }
    #score { color: #fff; font-size: 26px; font-weight: bold; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
    #height { color: #FFD700; font-size: 18px; font-weight: bold; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); margin-top: 5px; }
    
    #fuel-container {
      margin-top: 12px;
      background: rgba(0,0,0,0.6);
      border-radius: 12px;
      padding: 8px 12px;
      width: 180px;
      border: 2px solid rgba(0,191,255,0.5);
    }
    #fuel-label { color: #00BFFF; font-size: 14px; font-weight: bold; text-shadow: 0 0 10px rgba(0,191,255,0.5); }
    #fuel-bar { 
      width: 100%; height: 20px; 
      background: #222; 
      border-radius: 10px; 
      overflow: hidden; 
      margin-top: 5px;
      border: 1px solid #444;
    }
    #fuel-fill { 
      height: 100%; 
      background: linear-gradient(90deg, #00BFFF, #00FF88); 
      transition: width 0.1s;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,255,136,0.5);
    }
    
    #reunion-popup {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      z-index: 50;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    #reunion-popup.active {
      opacity: 1;
    }
    #reunion-popup .hearts {
      font-size: 60px;
      animation: heartFloat 1s ease-out infinite;
    }
    @keyframes heartFloat {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.2); }
    }
    #reunion-popup .message {
      font-size: 36px;
      font-weight: bold;
      color: #FF69B4;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.5), 0 0 20px rgba(255,105,180,0.5);
      margin-top: 10px;
    }
    
    #mobile-controls {
      position: fixed;
      bottom: 30px;
      left: 0; right: 0;
      display: none;
      justify-content: space-between;
      padding: 0 25px;
      z-index: 20;
    }
    .ctrl-group { display: flex; gap: 15px; }
    .ctrl-btn {
      width: 75px; height: 75px;
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
      border: 3px solid rgba(255,255,255,0.7);
      font-size: 32px;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
    }
    .ctrl-btn:active { background: rgba(255,255,255,0.5); transform: scale(0.9); }
    .ctrl-btn.jump { background: rgba(0,200,255,0.4); border-color: #00C8FF; }
    .ctrl-btn.shoot { background: rgba(255,150,0,0.4); border-color: #FF9600; }
    
    .overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    #start-screen { background: linear-gradient(180deg, #87CEEB 0%, #228B22 100%); }
    #game-over { background: rgba(0,0,0,0.85); opacity: 0; pointer-events: none; transition: opacity 0.4s; }
    #game-over.active { opacity: 1; pointer-events: auto; }
    
    .title { font-size: 100px; margin-bottom: 10px; animation: bounce 1s ease-in-out infinite; }
    @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
    h1 { color: #fff; font-size: 48px; text-shadow: 3px 3px 6px rgba(0,0,0,0.3); margin-bottom: 8px; }
    .subtitle { color: #ffe4b5; font-size: 20px; margin-bottom: 25px; }
    .stats { color: #fff; font-size: 24px; text-align: center; margin-bottom: 25px; line-height: 1.6; }
    .stats span { color: #FFD700; font-weight: bold; }
    
    .btn {
      background: linear-gradient(180deg, #FF7F50 0%, #FF5722 100%);
      border: none;
      color: #fff;
      padding: 18px 55px;
      font-size: 26px;
      font-weight: bold;
      border-radius: 35px;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(255,87,34,0.4);
    }
    .btn:active { transform: scale(0.95); }
    #start-screen .btn { animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
    
    .instructions {
      color: rgba(255,255,255,0.9);
      font-size: 14px;
      margin-top: 25px;
      text-align: center;
      line-height: 1.8;
    }
    
    .hidden { display: none !important; }
  </style>
</head>
<body>

<div id="start-screen" class="overlay">
  <div class="title">🐵🚀</div>
  <h1>Fling Punch</h1>
  <div class="subtitle">Jetpack Jungle Adventure!</div>
  <button id="start-btn" class="btn">TAP TO PLAY</button>
  <div class="instructions">
    <b>Keyboard:</b> ← → Move | SPACE Jump (hold for jetpack!) | X Shoot<br>
    <b>Mobile:</b> Touch buttons below<br><br>
    🍌 Collect bananas | 👾 Shoot enemies | 🚀 Jetpack to fly higher!
  </div>
</div>

<canvas id="game-canvas"></canvas>

<div id="ui">
  <div id="score">🍌 0</div>
  <div id="height">📏 0m</div>
  <div id="fuel-container">
    <div id="fuel-label">🚀 JETPACK FUEL</div>
    <div id="fuel-bar"><div id="fuel-fill" style="width:100%"></div></div>
  </div>
</div>

<div id="mobile-controls">
  <div class="ctrl-group">
    <button class="ctrl-btn" id="btn-left">◀</button>
    <button class="ctrl-btn" id="btn-right">▶</button>
  </div>
  <div class="ctrl-group">
    <button class="ctrl-btn shoot" id="btn-shoot">💥</button>
    <button class="ctrl-btn jump" id="btn-jump">🚀</button>
  </div>
</div>

<div id="reunion-popup">
  <div class="hearts">💕💖💕</div>
  <div class="message">Together Forever!</div>
</div>

<div id="game-over" class="overlay">
  <h1 style="color:#FF6B6B">💔 Game Over!</h1>
  <div class="stats">
    Score: <span id="final-score">0</span> 🍌<br>
    Height: <span id="final-height">0</span>m
  </div>
  <button id="restart-btn" class="btn">Play Again</button>
</div>

<script>
// ============================================
// PLAY FUN SDK
// ============================================
let ogp = null, sdkReady = false;
if (typeof OpenGameSDK !== 'undefined') {
  ogp = new OpenGameSDK({ ui: { usePointsWidget: true, theme: 'dark' } });
  ogp.on('OnReady', () => sdkReady = true);
  ogp.init({ gameId: 'fling-punch' });
}

// ============================================
// CANVAS
// ============================================
const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// Mobile controls
if ('ontouchstart' in window) {
  document.getElementById('mobile-controls').style.display = 'flex';
}

// ============================================
// GAME STATE
// ============================================
let gameRunning = false;
let score = 0;
let maxHeight = 0;
let cameraY = 0;

// ============================================
// PUNCH
// ============================================
const punch = {
  x: 0, y: 0,
  vx: 0, vy: 0,
  width: 50, height: 60,
  onGround: false,
  fuel: 100,
  facing: 1,
  jetpackOn: false,
  shootCooldown: 0
};

// ============================================
// ARRAYS
// ============================================
let platforms = [];
let bananas = [];
let enemies = [];
let projectiles = [];
let particles = [];

// ============================================
// INPUT
// ============================================
const keys = {};
const touch = { left: false, right: false, jump: false, shoot: false };

document.addEventListener('keydown', e => { keys[e.code] = true; if(e.code === 'Space') e.preventDefault(); });
document.addEventListener('keyup', e => keys[e.code] = false);

['btn-left', 'btn-right', 'btn-jump', 'btn-shoot'].forEach(id => {
  const btn = document.getElementById(id);
  const key = id.split('-')[1];
  btn.addEventListener('touchstart', e => { e.preventDefault(); touch[key] = true; }, {passive: false});
  btn.addEventListener('touchend', e => { e.preventDefault(); touch[key] = false; }, {passive: false});
});

function pressed(action) {
  switch(action) {
    case 'left': return keys['ArrowLeft'] || keys['KeyA'] || touch.left;
    case 'right': return keys['ArrowRight'] || keys['KeyD'] || touch.right;
    case 'jump': return keys['Space'] || keys['ArrowUp'] || keys['KeyW'] || touch.jump;
    case 'shoot': return keys['KeyX'] || keys['KeyZ'] || touch.shoot;
  }
}

// ============================================
// AUDIO
// ============================================
let audioCtx = null;
function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }

function sound(type) {
  if (!audioCtx) return;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination);
  const t = audioCtx.currentTime;
  
  if (type === 'jump') {
    o.type = 'sine'; o.frequency.setValueAtTime(400, t); o.frequency.exponentialRampToValueAtTime(600, t+0.1);
    g.gain.setValueAtTime(0.2, t); g.gain.exponentialRampToValueAtTime(0.01, t+0.12);
    o.start(t); o.stop(t+0.12);
  } else if (type === 'jet') {
    o.type = 'sawtooth'; o.frequency.setValueAtTime(80+Math.random()*40, t);
    g.gain.setValueAtTime(0.06, t); g.gain.exponentialRampToValueAtTime(0.01, t+0.04);
    o.start(t); o.stop(t+0.04);
  } else if (type === 'shoot') {
    o.type = 'square'; o.frequency.setValueAtTime(600, t); o.frequency.exponentialRampToValueAtTime(150, t+0.1);
    g.gain.setValueAtTime(0.1, t); g.gain.exponentialRampToValueAtTime(0.01, t+0.1);
    o.start(t); o.stop(t+0.1);
  } else if (type === 'coin') {
    o.type = 'sine'; o.frequency.setValueAtTime(880, t); o.frequency.setValueAtTime(1100, t+0.08);
    g.gain.setValueAtTime(0.15, t); g.gain.exponentialRampToValueAtTime(0.01, t+0.15);
    o.start(t); o.stop(t+0.15);
  } else if (type === 'boom') {
    o.type = 'sawtooth'; o.frequency.setValueAtTime(150, t); o.frequency.exponentialRampToValueAtTime(40, t+0.15);
    g.gain.setValueAtTime(0.2, t); g.gain.exponentialRampToValueAtTime(0.01, t+0.15);
    o.start(t); o.stop(t+0.15);
  } else if (type === 'die') {
    o.type = 'sawtooth'; o.frequency.setValueAtTime(300, t); o.frequency.exponentialRampToValueAtTime(80, t+0.4);
    g.gain.setValueAtTime(0.15, t); g.gain.exponentialRampToValueAtTime(0.01, t+0.4);
    o.start(t); o.stop(t+0.4);
  }
}

// ============================================
// PARTICLES
// ============================================
function emit(x, y, color, n) {
  for (let i = 0; i < n; i++) {
    particles.push({
      x, y, vx: (Math.random()-0.5)*8, vy: -Math.random()*6-2,
      life: 1, color, size: 3+Math.random()*4
    });
  }
}

// ============================================
// SPAWN FUNCTIONS
// ============================================
let nextPlatformY = 0;

function spawnPlatform(y, w, px) {
  const width = w || (100 + Math.random() * 120);
  const x = px !== undefined ? px : (50 + Math.random() * (canvas.width - width - 100));
  platforms.push({ x, y, width, type: Math.random() < 0.08 ? 'move' : 'static', dir: 1, speed: 1+Math.random() });
}

function spawnBanana(x, y) { bananas.push({ x, y, got: false }); }

function spawnEnemy(x, y) {
  enemies.push({ x, y, vx: (Math.random()>0.5?1:-1)*(1.5+Math.random()), w: 45, h: 45, alive: true });
}

// ============================================
// DRAW FUNCTIONS
// ============================================
function drawBG() {
  // Sky gradient
  const hf = Math.min(maxHeight / 3000, 1);
  const g = ctx.createLinearGradient(0, 0, 0, canvas.height);
  g.addColorStop(0, `hsl(${200-hf*50}, ${70-hf*20}%, ${75-hf*35}%)`);
  g.addColorStop(1, `hsl(${150-hf*30}, ${60-hf*20}%, ${55-hf*25}%)`);
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  
  // Sun
  ctx.fillStyle = '#FFFACD';
  ctx.shadowColor = '#FFD700';
  ctx.shadowBlur = 40;
  ctx.beginPath();
  ctx.arc(canvas.width - 80, 70, 35, 0, Math.PI*2);
  ctx.fill();
  ctx.shadowBlur = 0;
  
  // Clouds
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  for (let i = 0; i < 5; i++) {
    const cx = ((i*220 + Date.now()*0.008) % (canvas.width+200)) - 80;
    const cy = 40 + (i%3)*50;
    ctx.beginPath();
    ctx.arc(cx, cy, 22, 0, Math.PI*2);
    ctx.arc(cx+18, cy-8, 18, 0, Math.PI*2);
    ctx.arc(cx+36, cy, 22, 0, Math.PI*2);
    ctx.fill();
  }
  
  // Trees in back
  ctx.fillStyle = '#1B5E20';
  for (let i = 0; i < 12; i++) {
    const tx = ((i*130 - cameraY*0.05) % (canvas.width+150)) - 60;
    const th = 70 + Math.sin(i*1.8)*25;
    ctx.beginPath();
    ctx.moveTo(tx, canvas.height);
    ctx.lineTo(tx+35, canvas.height-th);
    ctx.lineTo(tx+70, canvas.height);
    ctx.fill();
  }
}

function drawPlatform(p) {
  const sx = p.x;
  const sy = canvas.height - (p.y - cameraY);
  
  if (sy < -30 || sy > canvas.height + 30) return;
  
  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.beginPath();
  ctx.roundRect(sx+4, sy+4, p.width, 20, 8);
  ctx.fill();
  
  // Platform body
  const pg = ctx.createLinearGradient(sx, sy-5, sx, sy+18);
  pg.addColorStop(0, '#8B5A2B');
  pg.addColorStop(1, '#5D3A1A');
  ctx.fillStyle = pg;
  ctx.beginPath();
  ctx.roundRect(sx, sy-5, p.width, 22, 8);
  ctx.fill();
  
  // Grass top
  ctx.fillStyle = '#2E7D32';
  ctx.beginPath();
  ctx.roundRect(sx, sy-10, p.width, 12, [6,6,0,0]);
  ctx.fill();
  
  // Grass blades
  ctx.strokeStyle = '#4CAF50';
  ctx.lineWidth = 2;
  for (let i = 8; i < p.width-8; i += 12) {
    const bh = 4 + Math.sin(Date.now()*0.004+i)*2;
    ctx.beginPath();
    ctx.moveTo(sx+i, sy-10);
    ctx.lineTo(sx+i+Math.sin(Date.now()*0.003+i)*2, sy-10-bh);
    ctx.stroke();
  }
}

function drawPunch() {
  const sx = punch.x;
  const sy = canvas.height - (punch.y - cameraY) - punch.height;
  
  ctx.save();
  ctx.translate(sx + punch.width/2, sy + punch.height/2);
  ctx.scale(punch.facing, 1);
  
  // Jetpack flame
  if (punch.jetpackOn && punch.fuel > 0) {
    const fh = 15 + Math.random()*12;
    ctx.fillStyle = '#FF6600';
    ctx.beginPath();
    ctx.moveTo(-12, 30);
    ctx.lineTo(-8, 30+fh);
    ctx.lineTo(-4, 30);
    ctx.fill();
    ctx.fillStyle = '#FFFF00';
    ctx.beginPath();
    ctx.moveTo(-10, 30);
    ctx.lineTo(-8, 30+fh*0.6);
    ctx.lineTo(-6, 30);
    ctx.fill();
  }
  
  // Jetpack
  ctx.fillStyle = '#455A64';
  ctx.fillRect(-16, -5, 10, 35);
  ctx.fillStyle = '#00BCD4';
  ctx.fillRect(-14, 0, 6, 25);
  
  // Body
  ctx.fillStyle = '#8D6E63';
  ctx.beginPath();
  ctx.ellipse(0, 18, 18, 24, 0, 0, Math.PI*2);
  ctx.fill();
  
  // Belly
  ctx.fillStyle = '#BCAAA4';
  ctx.beginPath();
  ctx.ellipse(4, 20, 11, 16, 0, 0, Math.PI*2);
  ctx.fill();
  
  // Head
  ctx.fillStyle = '#795548';
  ctx.beginPath();
  ctx.arc(0, -12, 26, 0, Math.PI*2);
  ctx.fill();
  
  // Face
  ctx.fillStyle = '#FFCCBC';
  ctx.beginPath();
  ctx.moveTo(0, 8);
  ctx.bezierCurveTo(-18, 0, -16, -28, 0, -24);
  ctx.bezierCurveTo(16, -28, 18, 0, 0, 8);
  ctx.fill();
  
  // Eyes
  ctx.fillStyle = '#FFF';
  ctx.beginPath();
  ctx.ellipse(-8, -14, 7, 9, 0, 0, Math.PI*2);
  ctx.ellipse(8, -14, 7, 9, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.arc(-8, -12, 4, 0, Math.PI*2);
  ctx.arc(8, -12, 4, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = '#FFF';
  ctx.beginPath();
  ctx.arc(-6, -14, 2, 0, Math.PI*2);
  ctx.arc(10, -14, 2, 0, Math.PI*2);
  ctx.fill();
  
  // Nose & mouth
  ctx.fillStyle = '#D7CCC8';
  ctx.beginPath();
  ctx.ellipse(0, -2, 5, 3, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.strokeStyle = '#6D4C41';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.arc(0, 2, 4, 0.1*Math.PI, 0.9*Math.PI);
  ctx.stroke();
  
  // Ears
  ctx.fillStyle = '#795548';
  ctx.beginPath();
  ctx.ellipse(-24, -10, 8, 10, 0, 0, Math.PI*2);
  ctx.ellipse(24, -10, 8, 10, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = '#FFCCBC';
  ctx.beginPath();
  ctx.ellipse(-24, -10, 4, 6, 0, 0, Math.PI*2);
  ctx.ellipse(24, -10, 4, 6, 0, 0, Math.PI*2);
  ctx.fill();
  
  // Arm
  ctx.strokeStyle = '#795548';
  ctx.lineWidth = 8;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(14, 8);
  ctx.lineTo(28, 22);
  ctx.stroke();
  
  // Legs
  ctx.beginPath();
  ctx.moveTo(-6, 40);
  ctx.lineTo(-10, 52);
  ctx.moveTo(6, 40);
  ctx.lineTo(10, 52);
  ctx.stroke();
  
  ctx.restore();
}

function drawBanana(b) {
  if (b.got) return;
  const sx = b.x;
  const sy = canvas.height - (b.y - cameraY);
  
  if (sy < -30 || sy > canvas.height + 30) return;
  
  ctx.save();
  ctx.translate(sx, sy);
  ctx.rotate(Math.sin(Date.now()*0.004)*0.15);
  
  ctx.shadowColor = '#FFD700';
  ctx.shadowBlur = 12;
  ctx.fillStyle = '#FFD700';
  ctx.beginPath();
  ctx.ellipse(0, 0, 10, 18, 0.3, 0, Math.PI*2);
  ctx.fill();
  ctx.shadowBlur = 0;
  
  ctx.fillStyle = '#5D4037';
  ctx.fillRect(-2, -20, 4, 5);
  
  ctx.restore();
}

function drawEnemy(e) {
  if (!e.alive) return;
  const sx = e.x;
  const sy = canvas.height - (e.y - cameraY) - e.h;
  
  if (sy < -50 || sy > canvas.height + 50) return;
  
  const cx = sx + e.w/2;
  const cy = sy + e.h/2;
  
  // Spiky fur silhouette (rogue look)
  ctx.fillStyle = '#1a0a0a';
  for (let i = 0; i < 8; i++) {
    const angle = (i / 8) * Math.PI * 2;
    const spikeLen = 8 + Math.sin(Date.now()*0.01 + i)*3;
    ctx.beginPath();
    ctx.moveTo(cx + Math.cos(angle)*e.w/2, cy + Math.sin(angle)*e.h/2);
    ctx.lineTo(cx + Math.cos(angle)*(e.w/2 + spikeLen), cy + Math.sin(angle)*(e.h/2 + spikeLen));
    ctx.lineTo(cx + Math.cos(angle + 0.3)*e.w/2, cy + Math.sin(angle + 0.3)*e.h/2);
    ctx.fill();
  }
  
  // Dark body
  ctx.fillStyle = '#2d1f1f';
  ctx.beginPath();
  ctx.arc(cx, cy, e.w/2, 0, Math.PI*2);
  ctx.fill();
  
  // Scar across face
  ctx.strokeStyle = '#8B0000';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(sx + 8, sy + 12);
  ctx.lineTo(sx + e.w - 12, sy + e.h - 15);
  ctx.stroke();
  
  // Glowing red eyes
  ctx.shadowColor = '#FF0000';
  ctx.shadowBlur = 15;
  ctx.fillStyle = '#FF0000';
  ctx.beginPath();
  ctx.arc(sx + e.w*0.32, sy + e.h*0.4, 7, 0, Math.PI*2);
  ctx.arc(sx + e.w*0.68, sy + e.h*0.4, 7, 0, Math.PI*2);
  ctx.fill();
  ctx.shadowBlur = 0;
  
  // Evil pupils (slits)
  ctx.fillStyle = '#000';
  ctx.fillRect(sx + e.w*0.32 - 1.5, sy + e.h*0.35, 3, 10);
  ctx.fillRect(sx + e.w*0.68 - 1.5, sy + e.h*0.35, 3, 10);
  
  // Angry V eyebrows
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 4;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(sx + e.w*0.15, sy + e.h*0.2);
  ctx.lineTo(sx + e.w*0.38, sy + e.h*0.3);
  ctx.moveTo(sx + e.w*0.85, sy + e.h*0.2);
  ctx.lineTo(sx + e.w*0.62, sy + e.h*0.3);
  ctx.stroke();
  
  // Fangs / angry mouth
  ctx.fillStyle = '#1a0a0a';
  ctx.beginPath();
  ctx.arc(cx, sy + e.h*0.7, 8, 0, Math.PI);
  ctx.fill();
  ctx.fillStyle = '#FFF';
  ctx.beginPath();
  ctx.moveTo(cx - 6, sy + e.h*0.68);
  ctx.lineTo(cx - 3, sy + e.h*0.8);
  ctx.lineTo(cx, sy + e.h*0.68);
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(cx, sy + e.h*0.68);
  ctx.lineTo(cx + 3, sy + e.h*0.8);
  ctx.lineTo(cx + 6, sy + e.h*0.68);
  ctx.fill();
}

// ============================================
// STUFFED TOY (Goal)
// ============================================
let stuffedToy = null;
let reunionActive = false;
let reunionTimer = 0;
let nextToyHeight = 500; // First toy at 500m (5000 units)

function spawnStuffedToy(y) {
  const platform = platforms.find(p => Math.abs(p.y - y) < 100);
  if (platform) {
    stuffedToy = { x: platform.x + platform.width/2, y: platform.y + 50, collected: false };
  } else {
    stuffedToy = { x: canvas.width/2, y: y, collected: false };
  }
}

function drawStuffedToy() {
  if (!stuffedToy || stuffedToy.collected) return;
  
  const sx = stuffedToy.x;
  const sy = canvas.height - (stuffedToy.y - cameraY);
  
  if (sy < -80 || sy > canvas.height + 80) return;
  
  // Floating animation
  const float = Math.sin(Date.now() * 0.003) * 8;
  const ty = sy + float;
  
  // Glow effect
  ctx.shadowColor = '#FFD700';
  ctx.shadowBlur = 25;
  
  // Orange plush body
  ctx.fillStyle = '#FF8C00';
  ctx.beginPath();
  ctx.ellipse(sx, ty, 25, 30, 0, 0, Math.PI*2);
  ctx.fill();
  
  // Lighter belly
  ctx.fillStyle = '#FFDAB9';
  ctx.beginPath();
  ctx.ellipse(sx, ty + 5, 15, 18, 0, 0, Math.PI*2);
  ctx.fill();
  
  // Head
  ctx.fillStyle = '#FF8C00';
  ctx.beginPath();
  ctx.arc(sx, ty - 30, 22, 0, Math.PI*2);
  ctx.fill();
  
  // Face
  ctx.fillStyle = '#FFDAB9';
  ctx.beginPath();
  ctx.ellipse(sx, ty - 28, 14, 16, 0, 0, Math.PI*2);
  ctx.fill();
  
  ctx.shadowBlur = 0;
  
  // Button eyes (stitched look)
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.arc(sx - 6, ty - 32, 4, 0, Math.PI*2);
  ctx.arc(sx + 6, ty - 32, 4, 0, Math.PI*2);
  ctx.fill();
  
  // X stitches on eyes
  ctx.strokeStyle = '#444';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(sx - 8, ty - 34); ctx.lineTo(sx - 4, ty - 30);
  ctx.moveTo(sx - 8, ty - 30); ctx.lineTo(sx - 4, ty - 34);
  ctx.moveTo(sx + 4, ty - 34); ctx.lineTo(sx + 8, ty - 30);
  ctx.moveTo(sx + 4, ty - 30); ctx.lineTo(sx + 8, ty - 34);
  ctx.stroke();
  
  // Cute smile
  ctx.strokeStyle = '#8B4513';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(sx, ty - 24, 6, 0.1*Math.PI, 0.9*Math.PI);
  ctx.stroke();
  
  // Little ears
  ctx.fillStyle = '#FF8C00';
  ctx.beginPath();
  ctx.arc(sx - 18, ty - 42, 8, 0, Math.PI*2);
  ctx.arc(sx + 18, ty - 42, 8, 0, Math.PI*2);
  ctx.fill();
  
  // Arms reaching out
  ctx.strokeStyle = '#FF8C00';
  ctx.lineWidth = 10;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(sx - 20, ty);
  ctx.lineTo(sx - 35, ty - 15);
  ctx.moveTo(sx + 20, ty);
  ctx.lineTo(sx + 35, ty - 15);
  ctx.stroke();
  
  // Heart above (waiting for Punch!)
  ctx.fillStyle = '#FF69B4';
  const heartY = ty - 70 + Math.sin(Date.now()*0.005)*5;
  ctx.beginPath();
  ctx.moveTo(sx, heartY + 8);
  ctx.bezierCurveTo(sx - 10, heartY, sx - 10, heartY - 10, sx, heartY - 5);
  ctx.bezierCurveTo(sx + 10, heartY - 10, sx + 10, heartY, sx, heartY + 8);
  ctx.fill();
}

function drawProjectile(p) {
  const sx = p.x;
  const sy = canvas.height - (p.y - cameraY);
  
  ctx.save();
  ctx.translate(sx, sy);
  ctx.rotate(Date.now() * 0.02);
  ctx.fillStyle = '#FFEB3B';
  ctx.beginPath();
  ctx.ellipse(0, 0, 6, 12, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();
}

function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, canvas.height - (p.y - cameraY), p.size, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// ============================================
// UPDATE
// ============================================
const GRAVITY = 0.55;
const JUMP_VEL = 14;
const MOVE_SPD = 6;
const JET_POWER = 0.7;

function update() {
  if (!gameRunning) return;
  
  // Movement
  if (pressed('left')) { punch.vx = -MOVE_SPD; punch.facing = -1; }
  else if (pressed('right')) { punch.vx = MOVE_SPD; punch.facing = 1; }
  else punch.vx *= 0.85;
  
  // Jump & Jetpack
  punch.jetpackOn = false;
  if (pressed('jump')) {
    if (punch.onGround) {
      punch.vy = JUMP_VEL;
      punch.onGround = false;
      sound('jump');
    } else if (punch.fuel > 0 && punch.vy < 10) {
      punch.vy += JET_POWER;
      if (punch.vy > 10) punch.vy = 10;
      punch.fuel -= 0.6;
      punch.jetpackOn = true;
      if (Math.random() < 0.25) sound('jet');
    }
  }
  
  // Shoot
  if (pressed('shoot') && punch.shootCooldown <= 0) {
    projectiles.push({
      x: punch.x + punch.width/2 + punch.facing * 25,
      y: punch.y + 30,
      vx: punch.facing * 14
    });
    punch.shootCooldown = 18;
    sound('shoot');
  }
  if (punch.shootCooldown > 0) punch.shootCooldown--;
  
  // Refuel on ground
  if (punch.onGround && punch.fuel < 100) punch.fuel += 0.8;
  
  // Gravity
  punch.vy -= GRAVITY;
  
  // Apply velocity
  punch.x += punch.vx;
  punch.y += punch.vy;
  
  // Platform collision (from above, landing on top)
  punch.onGround = false;
  for (const p of platforms) {
    // Moving platform
    if (p.type === 'move') {
      p.x += p.dir * p.speed;
      if (p.x < 30 || p.x + p.width > canvas.width - 30) p.dir *= -1;
    }
    
    // Check if landing on platform
    if (punch.vy <= 0) { // Falling or stationary
      const pTop = p.y;
      const wasAbove = (punch.y - punch.vy) >= pTop;
      const nowBelow = punch.y < pTop + 15;
      const xOverlap = punch.x + punch.width > p.x && punch.x < p.x + p.width;
      
      if (wasAbove && nowBelow && xOverlap && punch.y >= pTop - 5) {
        punch.y = pTop;
        punch.vy = 0;
        punch.onGround = true;
        if (p.type === 'move') punch.x += p.dir * p.speed;
      }
    }
  }
  
  // Ground collision
  if (punch.y <= 0) {
    punch.y = 0;
    punch.vy = 0;
    punch.onGround = true;
  }
  
  // Screen bounds
  if (punch.x < 0) punch.x = 0;
  if (punch.x > canvas.width - punch.width) punch.x = canvas.width - punch.width;
  
  // Max height
  if (punch.y > maxHeight) {
    const gain = Math.floor((punch.y - maxHeight) / 15);
    if (gain > 0 && sdkReady && ogp) ogp.addPoints(gain);
    maxHeight = punch.y;
  }
  
  // Spawn stuffed toy at milestones (every 500m = 5000 units)
  if (maxHeight >= nextToyHeight * 10 && !stuffedToy) {
    spawnStuffedToy(nextToyHeight * 10 + 200);
  }
  
  // Check reunion with stuffed toy
  if (stuffedToy && !stuffedToy.collected && !reunionActive) {
    const dx = punch.x + punch.width/2 - stuffedToy.x;
    const dy = punch.y + punch.height/2 - stuffedToy.y;
    if (Math.sqrt(dx*dx + dy*dy) < 50) {
      // REUNION!
      stuffedToy.collected = true;
      reunionActive = true;
      reunionTimer = 120; // 2 seconds at 60fps
      score += 500;
      if (sdkReady && ogp) ogp.addPoints(500);
      sound('coin');
      document.getElementById('reunion-popup').classList.add('active');
      
      // Spawn hearts
      for (let i = 0; i < 20; i++) {
        emit(stuffedToy.x + (Math.random()-0.5)*60, stuffedToy.y + (Math.random()-0.5)*60, '#FF69B4', 1);
      }
      
      // Set next toy higher
      nextToyHeight += 500;
    }
  }
  
  // Reunion timer
  if (reunionActive) {
    reunionTimer--;
    if (reunionTimer <= 0) {
      reunionActive = false;
      document.getElementById('reunion-popup').classList.remove('active');
      stuffedToy = null; // Ready for next one
    }
  }
  
  // Camera
  const targetCam = punch.y - canvas.height * 0.35;
  cameraY += (targetCam - cameraY) * 0.1;
  if (cameraY < 0) cameraY = 0;
  
  // Spawn platforms ahead
  while (nextPlatformY < cameraY + canvas.height + 400) {
    spawnPlatform(nextPlatformY);
    
    // Banana
    if (Math.random() < 0.35) {
      const lp = platforms[platforms.length-1];
      spawnBanana(lp.x + lp.width/2, lp.y + 35);
    }
    
    // Enemy
    if (Math.random() < 0.12 && nextPlatformY > 250) {
      const lp = platforms[platforms.length-1];
      spawnEnemy(lp.x + 15, lp.y + 5);
    }
    
    nextPlatformY += 70 + Math.random() * 50;
  }
  
  // Update enemies
  for (const e of enemies) {
    if (!e.alive) continue;
    e.x += e.vx;
    
    // Find platform
    const ep = platforms.find(p => e.y >= p.y-5 && e.y <= p.y+15 && e.x+e.w > p.x && e.x < p.x+p.width);
    if (ep) {
      if (e.x < ep.x + 5) { e.x = ep.x + 5; e.vx *= -1; }
      if (e.x + e.w > ep.x + ep.width - 5) { e.x = ep.x + ep.width - e.w - 5; e.vx *= -1; }
    }
    
    // Hit player
    if (punch.x < e.x + e.w && punch.x + punch.width > e.x &&
        punch.y < e.y + e.h && punch.y + punch.height > e.y) {
      die();
      return;
    }
  }
  
  // Update projectiles
  for (let i = projectiles.length - 1; i >= 0; i--) {
    const pr = projectiles[i];
    pr.x += pr.vx;
    
    // Hit enemy
    for (const e of enemies) {
      if (!e.alive) continue;
      if (pr.x > e.x && pr.x < e.x + e.w && pr.y > e.y && pr.y < e.y + e.h) {
        e.alive = false;
        score += 100;
        if (sdkReady && ogp) ogp.addPoints(100);
        sound('boom');
        emit(e.x + e.w/2, e.y + e.h/2, '#FF5722', 12);
        projectiles.splice(i, 1);
        break;
      }
    }
    
    // Off screen
    if (pr.x < -50 || pr.x > canvas.width + 50) projectiles.splice(i, 1);
  }
  
  // Collect bananas
  for (const b of bananas) {
    if (b.got) continue;
    const dx = punch.x + punch.width/2 - b.x;
    const dy = punch.y + punch.height/2 - b.y;
    if (Math.sqrt(dx*dx + dy*dy) < 35) {
      b.got = true;
      score += 50;
      if (sdkReady && ogp) ogp.addPoints(50);
      sound('coin');
      emit(b.x, b.y, '#FFD700', 10);
    }
  }
  
  // Cleanup
  platforms = platforms.filter(p => p.y > cameraY - 150);
  bananas = bananas.filter(b => b.y > cameraY - 150);
  enemies = enemies.filter(e => e.y > cameraY - 150);
  
  // Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.vy -= 0.15;
    p.y += p.vy;
    p.life -= 0.025;
    if (p.life <= 0) particles.splice(i, 1);
  }
  
  // Fall death
  if (punch.y < cameraY - 120) die();
  
  // Update UI
  document.getElementById('score').textContent = `🍌 ${score}`;
  document.getElementById('height').textContent = `📏 ${Math.floor(maxHeight/10)}m`;
  document.getElementById('fuel-fill').style.width = `${Math.max(0, punch.fuel)}%`;
}

// ============================================
// DRAW FLOATING HEARTS (during reunion)
// ============================================
let floatingHearts = [];

function drawFloatingHearts() {
  if (!reunionActive) return;
  
  // Spawn new hearts
  if (Math.random() < 0.3) {
    floatingHearts.push({
      x: punch.x + punch.width/2 + (Math.random()-0.5)*100,
      y: punch.y + 50,
      vx: (Math.random()-0.5)*2,
      vy: 2 + Math.random()*2,
      size: 15 + Math.random()*15,
      life: 1
    });
  }
  
  // Update and draw
  for (let i = floatingHearts.length - 1; i >= 0; i--) {
    const h = floatingHearts[i];
    h.x += h.vx;
    h.y += h.vy;
    h.life -= 0.015;
    
    if (h.life <= 0) {
      floatingHearts.splice(i, 1);
      continue;
    }
    
    const sx = h.x;
    const sy = canvas.height - (h.y - cameraY);
    
    ctx.globalAlpha = h.life;
    ctx.fillStyle = '#FF69B4';
    ctx.beginPath();
    ctx.moveTo(sx, sy + h.size*0.3);
    ctx.bezierCurveTo(sx - h.size*0.5, sy, sx - h.size*0.5, sy - h.size*0.5, sx, sy - h.size*0.25);
    ctx.bezierCurveTo(sx + h.size*0.5, sy - h.size*0.5, sx + h.size*0.5, sy, sx, sy + h.size*0.3);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

// ============================================
// RENDER
// ============================================
function render() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawBG();
  for (const p of platforms) drawPlatform(p);
  for (const b of bananas) drawBanana(b);
  drawStuffedToy();
  for (const e of enemies) drawEnemy(e);
  for (const pr of projectiles) drawProjectile(pr);
  drawPunch();
  drawParticles();
  drawFloatingHearts();
}

// ============================================
// GAME LOOP
// ============================================
function loop() {
  update();
  render();
  requestAnimationFrame(loop);
}

// ============================================
// START / DIE
// ============================================
function start() {
  initAudio();
  
  score = 0;
  maxHeight = 0;
  cameraY = 0;
  nextPlatformY = 100;
  
  punch.x = canvas.width/2 - 25;
  punch.y = 50;
  punch.vx = 0;
  punch.vy = 0;
  punch.fuel = 100;
  punch.facing = 1;
  punch.onGround = false;
  punch.shootCooldown = 0;
  
  platforms = [];
  bananas = [];
  enemies = [];
  projectiles = [];
  particles = [];
  floatingHearts = [];
  stuffedToy = null;
  reunionActive = false;
  reunionTimer = 0;
  nextToyHeight = 500;
  
  document.getElementById('reunion-popup').classList.remove('active');
  
  // Ground
  spawnPlatform(0, canvas.width - 20, 10);
  
  // Starting platforms
  for (let y = 100; y < 500; y += 70 + Math.random()*40) {
    spawnPlatform(y);
    nextPlatformY = y + 100;
  }
  
  document.getElementById('start-screen').classList.add('hidden');
  document.getElementById('game-over').classList.remove('active');
  gameRunning = true;
}

async function die() {
  gameRunning = false;
  sound('die');
  
  if (sdkReady && ogp && score > 0) {
    try { await ogp.endGame(); } catch(e) {}
  }
  
  document.getElementById('final-score').textContent = score;
  document.getElementById('final-height').textContent = Math.floor(maxHeight/10);
  document.getElementById('game-over').classList.add('active');
}

// ============================================
// INIT
// ============================================
document.getElementById('start-btn').addEventListener('click', start);
document.getElementById('restart-btn').addEventListener('click', start);

loop();
console.log('🐵🚀 Fling Punch loaded!');
</script>
