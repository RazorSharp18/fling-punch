<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="x-ogp-key" content="YOUR_API_KEY">
  <title>Fling Punch - Jetpack Jungle!</title>
  <script src="https://sdk.play.fun"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      overflow: hidden;
      touch-action: none;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
      background: #1a1a2e;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    
    #game-canvas { display: block; }
    
    #ui-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
    }
    
    #score-display {
      position: absolute;
      top: 20px; left: 20px;
      color: #fff;
      font-size: 28px;
      font-weight: bold;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
    }
    
    #fuel-bar {
      position: absolute;
      top: 60px; left: 20px;
      width: 150px; height: 20px;
      background: rgba(0,0,0,0.5);
      border-radius: 10px;
      overflow: hidden;
    }
    
    #fuel-fill {
      height: 100%;
      width: 100%;
      background: linear-gradient(90deg, #00bfff, #00ff88);
      transition: width 0.1s;
    }
    
    #fuel-label {
      position: absolute;
      top: 63px; left: 25px;
      color: #fff;
      font-size: 12px;
      font-weight: bold;
    }
    
    #mobile-controls {
      position: fixed;
      bottom: 20px;
      left: 0; right: 0;
      display: none;
      justify-content: space-between;
      padding: 0 20px;
      pointer-events: auto;
    }
    
    .mobile-btn-group {
      display: flex;
      gap: 15px;
    }
    
    .mobile-btn {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background: rgba(255,255,255,0.3);
      border: 3px solid rgba(255,255,255,0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      color: #fff;
      -webkit-tap-highlight-color: transparent;
    }
    
    .mobile-btn:active {
      background: rgba(255,255,255,0.5);
      transform: scale(0.95);
    }
    
    .mobile-btn.jetpack {
      background: rgba(0,191,255,0.4);
      border-color: #00bfff;
    }
    
    .mobile-btn.shoot {
      background: rgba(255,165,0,0.4);
      border-color: #ffa500;
    }
    
    #game-over {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.85);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s;
    }
    
    #game-over.active {
      opacity: 1;
      pointer-events: auto;
    }
    
    #game-over h1 { color: #ff6b6b; font-size: 48px; margin-bottom: 20px; }
    #game-over .stats { color: #fff; font-size: 24px; margin-bottom: 30px; text-align: center; }
    #game-over .stats span { color: #ffd700; }
    
    .game-btn {
      background: linear-gradient(180deg, #ff7f50 0%, #ff5722 100%);
      border: none;
      color: white;
      padding: 18px 50px;
      font-size: 26px;
      font-weight: bold;
      border-radius: 35px;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(255,87,34,0.4);
    }
    
    .game-btn:active { transform: scale(0.95); }
    
    #start-screen {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(180deg, #87CEEB 0%, #228B22 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    
    #start-screen .emoji { font-size: 100px; margin-bottom: 20px; animation: bounce 1s ease-in-out infinite; }
    @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
    
    #start-screen h1 { color: #fff; font-size: 48px; margin-bottom: 10px; text-shadow: 3px 3px 6px rgba(0,0,0,0.3); }
    #start-screen .subtitle { color: #ffe4b5; font-size: 20px; margin-bottom: 30px; }
    #start-screen .game-btn { animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
    
    #instructions { color: rgba(255,255,255,0.9); font-size: 14px; margin-top: 25px; text-align: center; line-height: 1.8; }
    
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div id="start-screen">
    <div class="emoji">🐵🚀</div>
    <h1>Fling Punch</h1>
    <div class="subtitle">Jetpack Jungle Adventure!</div>
    <button id="start-btn" class="game-btn">TAP TO PLAY</button>
    <div id="instructions">
      <b>Keyboard:</b> ← → Move | SPACE Jump/Jetpack | X Shoot<br>
      <b>Mobile:</b> Touch controls appear below<br><br>
      🍌 Collect bananas | 💀 Avoid enemies | 🚀 Use jetpack to fly!
    </div>
  </div>
  
  <canvas id="game-canvas"></canvas>
  
  <div id="ui-overlay">
    <div id="score-display">🍌 0</div>
    <div id="fuel-bar"><div id="fuel-fill"></div></div>
    <div id="fuel-label">🚀 FUEL</div>
  </div>
  
  <div id="mobile-controls">
    <div class="mobile-btn-group">
      <button class="mobile-btn" id="btn-left">←</button>
      <button class="mobile-btn" id="btn-right">→</button>
    </div>
    <div class="mobile-btn-group">
      <button class="mobile-btn shoot" id="btn-shoot">💥</button>
      <button class="mobile-btn jetpack" id="btn-jump">🚀</button>
    </div>
  </div>
  
  <div id="game-over">
    <h1>💔 Game Over!</h1>
    <div class="stats">
      Score: <span id="final-score">0</span> 🍌<br>
      Height: <span id="final-height">0</span>m
    </div>
    <button id="restart-btn" class="game-btn">Play Again</button>
  </div>

<script>
// ============================================
// PLAY FUN SDK
// ============================================
let ogp = null;
let sdkReady = false;

if (typeof OpenGameSDK !== 'undefined') {
  ogp = new OpenGameSDK({ ui: { usePointsWidget: true, theme: 'dark' } });
  ogp.on('OnReady', () => { sdkReady = true; });
  ogp.init({ gameId: 'fling-punch' });
}

// ============================================
// CANVAS SETUP
// ============================================
const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// Show mobile controls on touch devices
if ('ontouchstart' in window) {
  document.getElementById('mobile-controls').style.display = 'flex';
}

// ============================================
// GAME STATE
// ============================================
let gameRunning = false;
let score = 0;
let maxHeight = 0;
let cameraY = 0;

// ============================================
// PUNCH - THE HERO
// ============================================
const punch = {
  x: 0, y: 0,
  vx: 0, vy: 0,
  width: 50, height: 70,
  onGround: false,
  fuel: 100,
  maxFuel: 100,
  facing: 1, // 1 = right, -1 = left
  jetpackOn: false,
  shootCooldown: 0
};

function drawPunch() {
  const screenX = punch.x - cameraX;
  const screenY = canvas.height - (punch.y - cameraY) - punch.height;
  
  ctx.save();
  ctx.translate(screenX + punch.width/2, screenY + punch.height/2);
  ctx.scale(punch.facing, 1);
  
  const s = 0.7;
  
  // Jetpack flames
  if (punch.jetpackOn && punch.fuel > 0) {
    ctx.fillStyle = '#FF6600';
    ctx.beginPath();
    const flameHeight = 20 + Math.random() * 15;
    ctx.moveTo(-15 * s, 35 * s);
    ctx.lineTo(-10 * s, 35 * s + flameHeight);
    ctx.lineTo(-5 * s, 35 * s);
    ctx.fill();
    
    ctx.fillStyle = '#FFFF00';
    ctx.beginPath();
    ctx.moveTo(-12 * s, 35 * s);
    ctx.lineTo(-10 * s, 35 * s + flameHeight * 0.6);
    ctx.lineTo(-8 * s, 35 * s);
    ctx.fill();
  }
  
  // Jetpack on back
  ctx.fillStyle = '#444';
  ctx.fillRect(-20 * s, -10 * s, 12 * s, 40 * s);
  ctx.fillStyle = '#00BFFF';
  ctx.fillRect(-18 * s, -5 * s, 8 * s, 30 * s);
  
  // Body
  ctx.fillStyle = '#A08070';
  ctx.beginPath();
  ctx.ellipse(0, 20 * s, 22 * s, 28 * s, 0, 0, Math.PI * 2);
  ctx.fill();
  
  // Belly
  ctx.fillStyle = '#C4B0A0';
  ctx.beginPath();
  ctx.ellipse(5 * s, 22 * s, 14 * s, 18 * s, 0, 0, Math.PI * 2);
  ctx.fill();
  
  // Head
  ctx.fillStyle = '#8B7355';
  ctx.beginPath();
  ctx.arc(0, -18 * s, 32 * s, 0, Math.PI * 2);
  ctx.fill();
  
  // Face
  ctx.fillStyle = '#FFCDB8';
  ctx.beginPath();
  ctx.moveTo(0, 5 * s);
  ctx.bezierCurveTo(-22 * s, -5 * s, -20 * s, -35 * s, 0, -30 * s);
  ctx.bezierCurveTo(20 * s, -35 * s, 22 * s, -5 * s, 0, 5 * s);
  ctx.fill();
  
  // Eyes
  ctx.fillStyle = '#FFF';
  ctx.beginPath();
  ctx.ellipse(-10 * s, -20 * s, 8 * s, 10 * s, 0, 0, Math.PI * 2);
  ctx.ellipse(10 * s, -20 * s, 8 * s, 10 * s, 0, 0, Math.PI * 2);
  ctx.fill();
  
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.arc(-10 * s, -18 * s, 5 * s, 0, Math.PI * 2);
  ctx.arc(10 * s, -18 * s, 5 * s, 0, Math.PI * 2);
  ctx.fill();
  
  ctx.fillStyle = '#FFF';
  ctx.beginPath();
  ctx.arc(-8 * s, -20 * s, 2 * s, 0, Math.PI * 2);
  ctx.arc(12 * s, -20 * s, 2 * s, 0, Math.PI * 2);
  ctx.fill();
  
  // Nose
  ctx.fillStyle = '#D4A5A5';
  ctx.beginPath();
  ctx.ellipse(0, -5 * s, 6 * s, 4 * s, 0, 0, Math.PI * 2);
  ctx.fill();
  
  // Smile
  ctx.strokeStyle = '#8B6969';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(0, -2 * s, 5 * s, 0.1 * Math.PI, 0.9 * Math.PI);
  ctx.stroke();
  
  // Ears
  ctx.fillStyle = '#8B7355';
  ctx.beginPath();
  ctx.ellipse(-30 * s, -18 * s, 10 * s, 12 * s, 0, 0, Math.PI * 2);
  ctx.ellipse(30 * s, -18 * s, 10 * s, 12 * s, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#FFCDB8';
  ctx.beginPath();
  ctx.ellipse(-30 * s, -18 * s, 5 * s, 7 * s, 0, 0, Math.PI * 2);
  ctx.ellipse(30 * s, -18 * s, 5 * s, 7 * s, 0, 0, Math.PI * 2);
  ctx.fill();
  
  // Arms
  ctx.strokeStyle = '#8B7355';
  ctx.lineWidth = 10 * s;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(18 * s, 10 * s);
  ctx.lineTo(35 * s, 25 * s);
  ctx.stroke();
  
  // Legs
  ctx.beginPath();
  ctx.moveTo(-8 * s, 45 * s);
  ctx.lineTo(-12 * s, 60 * s);
  ctx.moveTo(8 * s, 45 * s);
  ctx.lineTo(12 * s, 60 * s);
  ctx.stroke();
  
  ctx.restore();
}

// ============================================
// PLATFORMS
// ============================================
const platforms = [];
let platformSpawnY = 0;

function spawnPlatform(y, width, x) {
  platforms.push({
    x: x !== undefined ? x : Math.random() * (canvas.width - width - 100) + 50,
    y: y,
    width: width || 120 + Math.random() * 100,
    type: Math.random() < 0.1 ? 'moving' : 'static',
    moveDir: 1,
    moveSpeed: 1 + Math.random()
  });
}

function drawPlatform(p) {
  const screenX = p.x - cameraX;
  const screenY = canvas.height - (p.y - cameraY);
  
  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.roundRect(screenX + 5, screenY + 5, p.width, 22, 10);
  ctx.fill();
  
  // Platform
  const grad = ctx.createLinearGradient(0, screenY - 10, 0, screenY + 15);
  grad.addColorStop(0, '#8B4513');
  grad.addColorStop(1, '#654321');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.roundRect(screenX, screenY - 10, p.width, 22, 10);
  ctx.fill();
  
  // Grass on top
  ctx.fillStyle = '#228B22';
  ctx.beginPath();
  ctx.roundRect(screenX, screenY - 15, p.width, 12, [8, 8, 0, 0]);
  ctx.fill();
  
  // Grass blades
  ctx.strokeStyle = '#32CD32';
  ctx.lineWidth = 2;
  for (let i = 0; i < p.width; i += 15) {
    const h = 5 + Math.sin(i + Date.now() * 0.002) * 3;
    ctx.beginPath();
    ctx.moveTo(screenX + i + 7, screenY - 15);
    ctx.lineTo(screenX + i + 7 + Math.sin(Date.now() * 0.003 + i) * 2, screenY - 15 - h);
    ctx.stroke();
  }
}

// ============================================
// BANANAS
// ============================================
const bananas = [];

function spawnBanana(x, y) {
  bananas.push({ x, y, collected: false, rotation: Math.random() * Math.PI * 2 });
}

function drawBanana(b) {
  if (b.collected) return;
  
  const screenX = b.x - cameraX;
  const screenY = canvas.height - (b.y - cameraY);
  
  ctx.save();
  ctx.translate(screenX, screenY);
  ctx.rotate(Math.sin(Date.now() * 0.003 + b.rotation) * 0.2);
  
  // Glow
  ctx.shadowColor = '#FFD700';
  ctx.shadowBlur = 15;
  
  ctx.fillStyle = '#FFD700';
  ctx.beginPath();
  ctx.ellipse(0, 0, 12, 20, 0.3, 0, Math.PI * 2);
  ctx.fill();
  
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#8B4513';
  ctx.fillRect(-2, -22, 4, 6);
  
  ctx.restore();
}

// ============================================
// ENEMIES
// ============================================
const enemies = [];

function spawnEnemy(x, y) {
  enemies.push({
    x, y,
    vx: (Math.random() > 0.5 ? 1 : -1) * (1 + Math.random()),
    width: 40, height: 40,
    alive: true
  });
}

function drawEnemy(e) {
  if (!e.alive) return;
  
  const screenX = e.x - cameraX;
  const screenY = canvas.height - (e.y - cameraY) - e.height;
  
  // Evil monkey
  ctx.fillStyle = '#4a3728';
  ctx.beginPath();
  ctx.arc(screenX + 20, screenY + 20, 20, 0, Math.PI * 2);
  ctx.fill();
  
  // Red eyes
  ctx.fillStyle = '#FF0000';
  ctx.beginPath();
  ctx.arc(screenX + 14, screenY + 16, 5, 0, Math.PI * 2);
  ctx.arc(screenX + 26, screenY + 16, 5, 0, Math.PI * 2);
  ctx.fill();
  
  // Angry brows
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(screenX + 8, screenY + 10);
  ctx.lineTo(screenX + 18, screenY + 14);
  ctx.moveTo(screenX + 32, screenY + 10);
  ctx.lineTo(screenX + 22, screenY + 14);
  ctx.stroke();
}

// ============================================
// PROJECTILES
// ============================================
const projectiles = [];

function shoot() {
  if (punch.shootCooldown > 0) return;
  
  projectiles.push({
    x: punch.x + punch.width/2 + punch.facing * 20,
    y: punch.y + 30,
    vx: punch.facing * 15,
    vy: 0
  });
  
  punch.shootCooldown = 15;
  playSound('shoot');
}

function drawProjectile(p) {
  const screenX = p.x - cameraX;
  const screenY = canvas.height - (p.y - cameraY);
  
  // Banana peel projectile
  ctx.fillStyle = '#FFD700';
  ctx.save();
  ctx.translate(screenX, screenY);
  ctx.rotate(Date.now() * 0.02);
  ctx.beginPath();
  ctx.ellipse(0, 0, 8, 15, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

// ============================================
// PARTICLES
// ============================================
const particles = [];

function emitParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 8,
      vy: Math.random() * -6 - 2,
      life: 1,
      color,
      size: 3 + Math.random() * 5
    });
  }
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.vy += 0.3;
    p.y += p.vy;
    p.life -= 0.02;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// ============================================
// BACKGROUND
// ============================================
let cameraX = 0;

function drawBackground() {
  // Sky
  const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
  const heightFactor = Math.min(maxHeight / 2000, 1);
  grad.addColorStop(0, `hsl(${200 - heightFactor * 30}, 70%, ${70 - heightFactor * 30}%)`);
  grad.addColorStop(1, `hsl(${120 - heightFactor * 20}, 50%, ${60 - heightFactor * 20}%)`);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  
  // Sun
  ctx.fillStyle = '#FFF8DC';
  ctx.shadowColor = '#FFD700';
  ctx.shadowBlur = 40;
  ctx.beginPath();
  ctx.arc(canvas.width - 100, 80, 35, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;
  
  // Clouds
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  for (let i = 0; i < 6; i++) {
    const x = ((i * 200 + Date.now() * 0.01 - cameraX * 0.1) % (canvas.width + 200)) - 100;
    const y = 50 + (i % 3) * 60;
    ctx.beginPath();
    ctx.arc(x, y, 25, 0, Math.PI * 2);
    ctx.arc(x + 20, y - 10, 20, 0, Math.PI * 2);
    ctx.arc(x + 40, y, 25, 0, Math.PI * 2);
    ctx.fill();
  }
  
  // Distant trees
  ctx.fillStyle = '#1e4d1e';
  for (let i = 0; i < 15; i++) {
    const x = ((i * 150 - cameraX * 0.2 - cameraY * 0.05) % (canvas.width + 200)) - 50;
    const h = 60 + Math.sin(i * 2) * 30;
    ctx.beginPath();
    ctx.moveTo(x, canvas.height);
    ctx.lineTo(x + 30, canvas.height - h);
    ctx.lineTo(x + 60, canvas.height);
    ctx.fill();
  }
}

// ============================================
// INPUT
// ============================================
const keys = {};

document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'Space') e.preventDefault();
});
document.addEventListener('keyup', e => keys[e.code] = false);

// Mobile controls
const mobileState = { left: false, right: false, jump: false, shoot: false };

function setupMobileButton(id, state) {
  const btn = document.getElementById(id);
  btn.addEventListener('touchstart', e => { e.preventDefault(); mobileState[state] = true; });
  btn.addEventListener('touchend', e => { e.preventDefault(); mobileState[state] = false; });
}

setupMobileButton('btn-left', 'left');
setupMobileButton('btn-right', 'right');
setupMobileButton('btn-jump', 'jump');
setupMobileButton('btn-shoot', 'shoot');

function isPressed(action) {
  switch(action) {
    case 'left': return keys['ArrowLeft'] || keys['KeyA'] || mobileState.left;
    case 'right': return keys['ArrowRight'] || keys['KeyD'] || mobileState.right;
    case 'jump': return keys['Space'] || keys['ArrowUp'] || keys['KeyW'] || mobileState.jump;
    case 'shoot': return keys['KeyX'] || keys['KeyZ'] || mobileState.shoot;
  }
}

// ============================================
// AUDIO
// ============================================
let audioCtx = null;

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function playSound(type) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  const now = audioCtx.currentTime;
  
  switch(type) {
    case 'jump':
      osc.type = 'sine';
      osc.frequency.setValueAtTime(300, now);
      osc.frequency.exponentialRampToValueAtTime(500, now + 0.1);
      gain.gain.setValueAtTime(0.2, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
      osc.start(now); osc.stop(now + 0.15);
      break;
    case 'jetpack':
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(100 + Math.random() * 50, now);
      gain.gain.setValueAtTime(0.05, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
      osc.start(now); osc.stop(now + 0.05);
      break;
    case 'shoot':
      osc.type = 'square';
      osc.frequency.setValueAtTime(800, now);
      osc.frequency.exponentialRampToValueAtTime(200, now + 0.1);
      gain.gain.setValueAtTime(0.1, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
      osc.start(now); osc.stop(now + 0.1);
      break;
    case 'collect':
      osc.type = 'sine';
      osc.frequency.setValueAtTime(523, now);
      osc.frequency.setValueAtTime(659, now + 0.07);
      osc.frequency.setValueAtTime(784, now + 0.14);
      gain.gain.setValueAtTime(0.2, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.25);
      osc.start(now); osc.stop(now + 0.25);
      break;
    case 'hit':
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(200, now);
      osc.frequency.exponentialRampToValueAtTime(50, now + 0.3);
      gain.gain.setValueAtTime(0.15, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
      osc.start(now); osc.stop(now + 0.3);
      break;
    case 'explode':
      osc.type = 'square';
      osc.frequency.setValueAtTime(150, now);
      osc.frequency.exponentialRampToValueAtTime(30, now + 0.2);
      gain.gain.setValueAtTime(0.2, now);
      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
      osc.start(now); osc.stop(now + 0.2);
      break;
  }
}

// ============================================
// PHYSICS & GAME LOGIC
// ============================================
const GRAVITY = 0.5;
const JUMP_FORCE = -12;
const MOVE_SPEED = 5;
const JETPACK_FORCE = -0.8;

function update() {
  if (!gameRunning) return;
  
  // Input
  if (isPressed('left')) {
    punch.vx = -MOVE_SPEED;
    punch.facing = -1;
  } else if (isPressed('right')) {
    punch.vx = MOVE_SPEED;
    punch.facing = 1;
  } else {
    punch.vx *= 0.8;
  }
  
  // Jump / Jetpack
  punch.jetpackOn = false;
  if (isPressed('jump')) {
    if (punch.onGround) {
      punch.vy = JUMP_FORCE;
      punch.onGround = false;
      playSound('jump');
    } else if (punch.fuel > 0) {
      punch.vy += JETPACK_FORCE;
      punch.vy = Math.max(punch.vy, -8);
      punch.fuel -= 0.5;
      punch.jetpackOn = true;
      if (Math.random() < 0.3) playSound('jetpack');
    }
  }
  
  // Shoot
  if (isPressed('shoot')) shoot();
  if (punch.shootCooldown > 0) punch.shootCooldown--;
  
  // Refuel when on ground
  if (punch.onGround) {
    punch.fuel = Math.min(punch.maxFuel, punch.fuel + 0.5);
  }
  
  // Physics
  punch.vy += GRAVITY;
  punch.x += punch.vx;
  punch.y += punch.vy;
  
  // Platform collision
  punch.onGround = false;
  for (const p of platforms) {
    // Moving platforms
    if (p.type === 'moving') {
      p.x += p.moveDir * p.moveSpeed;
      if (p.x < 50 || p.x + p.width > canvas.width - 50) p.moveDir *= -1;
    }
    
    // Collision check
    if (punch.vy >= 0 &&
        punch.x + punch.width > p.x &&
        punch.x < p.x + p.width &&
        punch.y + punch.vy <= p.y + 15 &&
        punch.y >= p.y - 10) {
      punch.y = p.y;
      punch.vy = 0;
      punch.onGround = true;
      if (p.type === 'moving') punch.x += p.moveDir * p.moveSpeed;
    }
  }
  
  // Ground
  if (punch.y < 0) {
    punch.y = 0;
    punch.vy = 0;
    punch.onGround = true;
  }
  
  // Screen bounds
  punch.x = Math.max(0, Math.min(canvas.width - punch.width, punch.x));
  
  // Update max height
  if (punch.y > maxHeight) {
    const heightGain = Math.floor((punch.y - maxHeight) / 20);
    if (heightGain > 0 && sdkReady && ogp) ogp.addPoints(heightGain);
    maxHeight = punch.y;
  }
  
  // Camera
  cameraY = Math.max(0, punch.y - canvas.height * 0.4);
  cameraX = 0;
  
  // Spawn platforms
  while (platformSpawnY < cameraY + canvas.height + 300) {
    spawnPlatform(platformSpawnY);
    
    // Spawn banana on some platforms
    if (Math.random() < 0.4) {
      const lastP = platforms[platforms.length - 1];
      spawnBanana(lastP.x + lastP.width / 2, lastP.y + 40);
    }
    
    // Spawn enemy occasionally
    if (Math.random() < 0.15 && platformSpawnY > 300) {
      const lastP = platforms[platforms.length - 1];
      spawnEnemy(lastP.x + 20, lastP.y + 10);
    }
    
    platformSpawnY += 80 + Math.random() * 60;
  }
  
  // Update enemies
  for (const e of enemies) {
    if (!e.alive) continue;
    
    e.x += e.vx;
    
    // Bounce off edges
    const platform = platforms.find(p => 
      e.y >= p.y && e.y <= p.y + 20 &&
      e.x + e.width > p.x && e.x < p.x + p.width
    );
    if (platform) {
      if (e.x < platform.x || e.x + e.width > platform.x + platform.width) {
        e.vx *= -1;
      }
    }
    
    // Hit player
    if (punch.x < e.x + e.width &&
        punch.x + punch.width > e.x &&
        punch.y < e.y + e.height &&
        punch.y + punch.height > e.y) {
      gameOver();
      return;
    }
  }
  
  // Update projectiles
  for (let i = projectiles.length - 1; i >= 0; i--) {
    const p = projectiles[i];
    p.x += p.vx;
    p.y += p.vy;
    
    // Hit enemy
    for (const e of enemies) {
      if (!e.alive) continue;
      if (p.x > e.x && p.x < e.x + e.width &&
          p.y > e.y && p.y < e.y + e.height) {
        e.alive = false;
        score += 100;
        if (sdkReady && ogp) ogp.addPoints(100);
        playSound('explode');
        
        const screenX = e.x - cameraX;
        const screenY = canvas.height - (e.y - cameraY);
        emitParticles(screenX + 20, screenY - 20, '#FF6600', 15);
        
        projectiles.splice(i, 1);
        break;
      }
    }
    
    // Remove if off screen
    if (p.x < cameraX - 100 || p.x > cameraX + canvas.width + 100) {
      projectiles.splice(i, 1);
    }
  }
  
  // Collect bananas
  for (const b of bananas) {
    if (b.collected) continue;
    
    const dx = punch.x + punch.width/2 - b.x;
    const dy = punch.y + punch.height/2 - b.y;
    if (Math.sqrt(dx*dx + dy*dy) < 40) {
      b.collected = true;
      score += 50;
      if (sdkReady && ogp) ogp.addPoints(50);
      playSound('collect');
      
      const screenX = b.x - cameraX;
      const screenY = canvas.height - (b.y - cameraY);
      emitParticles(screenX, screenY, '#FFD700', 10);
    }
  }
  
  // Cleanup
  platforms.filter(p => p.y > cameraY - 200);
  bananas.filter(b => b.y > cameraY - 200);
  enemies.filter(e => e.y > cameraY - 200);
  
  // Fall death
  if (punch.y < cameraY - 100) {
    gameOver();
  }
  
  updateParticles();
  
  // Update UI
  document.getElementById('score-display').textContent = `🍌 ${score}`;
  document.getElementById('fuel-fill').style.width = `${punch.fuel}%`;
}

// ============================================
// RENDER
// ============================================
function render() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  
  drawBackground();
  
  for (const p of platforms) drawPlatform(p);
  for (const b of bananas) drawBanana(b);
  for (const e of enemies) drawEnemy(e);
  for (const p of projectiles) drawProjectile(p);
  
  drawPunch();
  drawParticles();
}

// ============================================
// GAME LOOP
// ============================================
function gameLoop() {
  update();
  render();
  requestAnimationFrame(gameLoop);
}

// ============================================
// GAME CONTROL
// ============================================
function startGame() {
  initAudio();
  
  score = 0;
  maxHeight = 0;
  cameraY = 0;
  platformSpawnY = 100;
  
  punch.x = canvas.width / 2 - 25;
  punch.y = 0;
  punch.vx = 0;
  punch.vy = 0;
  punch.fuel = 100;
  punch.facing = 1;
  punch.onGround = true;
  
  platforms.length = 0;
  bananas.length = 0;
  enemies.length = 0;
  projectiles.length = 0;
  particles.length = 0;
  
  // Starting platform
  spawnPlatform(0, canvas.width, 0);
  
  // Initial platforms
  for (let y = 100; y < 600; y += 80 + Math.random() * 60) {
    spawnPlatform(y);
    platformSpawnY = y + 100;
  }
  
  document.getElementById('start-screen').classList.add('hidden');
  document.getElementById('game-over').classList.remove('active');
  
  gameRunning = true;
}

async function gameOver() {
  gameRunning = false;
  playSound('hit');
  
  if (sdkReady && ogp && score > 0) {
    try { await ogp.endGame(); } catch(e) {}
  }
  
  document.getElementById('final-score').textContent = score;
  document.getElementById('final-height').textContent = Math.floor(maxHeight / 10);
  document.getElementById('game-over').classList.add('active');
}

// ============================================
// INIT
// ============================================
document.getElementById('start-btn').addEventListener('click', startGame);
document.getElementById('restart-btn').addEventListener('click', startGame);

gameLoop();
console.log('🐵🚀 Fling Punch - Jetpack Jungle loaded!');
</script>
